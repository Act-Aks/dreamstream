name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.caching=true -Dorg.gradle.configuration-cache=true
  JAVA_VERSION: 17
  ORG_GRADLE_PROJECT_warningsAsErrors: true

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: enhanced
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
          cache-cleanup: on-success
          add-job-summary: on-failure

      - name: Run static analysis
        run: ./gradlew detekt --no-daemon --stacktrace

      - name: Upload Detekt reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: detekt-reports
          path: |
            **/build/reports/detekt/*
          if-no-files-found: ignore
          retention-days: 7

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: enhanced
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
          cache-cleanup: on-success
          add-job-summary: on-failure

      - name: Run tests and checks
        run: ./gradlew check -x detekt --no-daemon --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/**
          if-no-files-found: ignore
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: enhanced
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
          cache-cleanup: on-success
          add-job-summary: on-failure

      - name: Build project
        run: ./gradlew assemble --no-daemon --stacktrace
