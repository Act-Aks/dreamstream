android-gradle-plugin           = { group = "com.android.tools.build",      name = "gradle",                                 version.ref = "agp" }
android-tools-common            = { group = "com.android.tools",            name = "common",                                 version.ref = "android-tools" }
compose-compiler-gradle-plugin  = { group = "org.jetbrains.kotlin",         name = "compose-compiler-gradle-plugin",         version.ref = "kotlin" }
compose-gradle-plugin           = { group = "org.jetbrains.compose",        name = "compose-gradle-plugin",                  version.ref = "compose-multiplatform" }
kotlin-gradle-plugin            = { group = "org.jetbrains.kotlin",         name = "kotlin-gradle-plugin",                   version.ref = "kotlin" }
ksp-gradle-plugin               = { group = "com.google.devtools.ksp",      name = "com.google.devtools.ksp.gradle.plugin",  version.ref = "ksp" }
room-gradle-plugin              = { group = "androidx.room3",               name = "room3-gradle-plugin",                    version.ref = "room" }
detekt-gradle-plugin            = { group = "dev.detekt",                   name = "detekt-gradle-plugin",                   version.ref = "detekt" }

# ── Android core / desugaring ──────────────────────────────────────────────
android-desugarJdkLibs      = { group = "com.android.tools",       name = "desugar_jdk_libs",          version.ref = "desugar-jdk-libs" }

# ═══════════════════════════════════════════════════════════════════════════
[bundles]
