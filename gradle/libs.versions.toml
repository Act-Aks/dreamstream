# ── Material3 Adaptive / WindowSizeClass ─────────────────────────────────────
compose-material3-adaptive             = { group = "org.jetbrains.compose.material3.adaptive", name = "adaptive",               version.ref = "compose-material3-adaptive" }
compose-material3-adaptive-layout      = { group = "org.jetbrains.compose.material3.adaptive", name = "adaptive-layout",        version.ref = "compose-material3-adaptive" }
compose-material3-adaptive-navigation3 = { group = "org.jetbrains.compose.material3.adaptive", name = "adaptive-navigation3",   version.ref = "compose-material3-adaptive" }

# ── Compose Multiplatform ────────────────────────────────────────────────────
compose-ui                      = { group = "org.jetbrains.compose.ui",          name = "ui",                       version.ref = "compose-multiplatform"  }
compose-ui-graphics             = { group = "org.jetbrains.compose.ui",          name = "ui-graphics",              version.ref = "compose-multiplatform"  }
compose-ui-tooling              = { group = "org.jetbrains.compose.ui",          name = "ui-tooling",               version.ref = "compose-multiplatform"  }
compose-ui-tooling-preview      = { group = "org.jetbrains.compose.ui",          name = "ui-tooling-preview",       version.ref = "compose-multiplatform"  }
