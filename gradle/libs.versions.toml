    "ktor-client-auth",
    "ktor-client-content-negotiation",
    "ktor-client-core",
    "ktor-client-logging",
    "ktor-serialization-kotlinx-json",
]

testing-unit-common = [
    "assertk",
    "junit-jupiter-api",
    "junit-jupiter-params",
    "koin-test",
    "kotlinx-coroutines-test",
    "turbine",
]

