# ═══════════════════════════════════════════════════════════════════════════
# DreamStream - Version Catalog
# Single source of truth for all dependencies
# Rules:
#   - No version is declared anywhere else in the project.
#   - Every library entry uses version.ref — no inline versions.
#   - Bundles group what convention plugins add together, keeping plugin code DRY.
#   - Convention plugin IDs (com.dreamstream.*) carry no version — they are resolved
#     from the included build-logic build, not from a remote repository.
# ═══════════════════════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════════════════════
[versions]
# ═══════════════════════════════════════════════════════════════════════════

# ── Kotlin & KSP ───────────────────────────────────────────────────────────
kotlin                      = "2.4.0"
ksp                         = "2.3.9"

# ── Android Gradle Plugin ──────────────────────────────────────────────────
agp                         = "9.2.1"
android-tools               = "32.2.1"

# ── AndroidX ───────────────────────────────────────────────────────────────
androidx-activity           = "1.13.0"
androidx-appcompat          = "1.7.1"
androidx-core-ktx           = "1.19.0"
androidx-splash-screen      = "1.2.0"
androidx-tv                 = "1.1.0"

# ── Core libraries ──────────────────────────────────────────────────────────
desugar-jdk-libs            = "2.1.5"

# ── Compose (Multiplatform) ─────────────────────────────────────────────────
compose-lifecycle           = "2.10.0"
compose-material3           = "1.12.0-alpha02"
compose-material3-adaptive  = "1.3.0-beta02"    # Window size class (adaptive layouts)
compose-multiplatform       = "1.12.0-alpha01"  # Compose Multiplatform governs the JB fork used for Desktop
compose-navigation3         = "1.1.1"

# ── DI ──────────────────────────────────────────────────────────────────────
koin                        = "4.2.2"

# ── Networking ──────────────────────────────────────────────────────────────
ktor                        = "3.5.0"

# ── HTML Parsing ──────────────────────────────────────────────────────────────
ksoup = "0.2.6"

# ── Local Storage ───────────────────────────────────────────────────────────
room                        = "3.0.0-alpha06"
sqlite                      = "2.6.2"
datastore                   = "1.2.1"

# ── Kotlinx - Coroutines, Serialization, Datetime ───────────────────────────
kotlinx-coroutines          = "1.11.0"
kotlinx-serialization       = "1.11.0"
kotlinx-datetime            = "0.8.0"

# ── Media ───────────────────────────────────────────────────────────────────
media3                      = "1.10.1"
vlcj                        = "4.12.1"    # Desktop player backend

# ── Image Loading ───────────────────────────────────────────────────────────
coil                        = "3.5.0-beta01"

# ── Logging ─────────────────────────────────────────────────────────────────
kermit                      = "2.1.0"

# ── UI Extras ───────────────────────────────────────────────────────────────
lottie-compose              = "6.7.1"    # Lottie animations (Android)
haze                        = "1.7.2"    # Blur / visual effects (Android 12+)
material-icons              = "1.7.3"
okio                        = "3.17.0"

# ── Code Quality ────────────────────────────────────────────────────────────
detekt                      = "2.0.0-alpha.5"
dependency-analysis         = "3.15.0"   # Unused/misconfigured dep detection
module-graph                = "0.12.1"   # Mermaid module dependency visualization
module-graph-assert         = "2.9.1"    # Architectural rule enforcement

# ── Testing ─────────────────────────────────────────────────────────────────
junit                       = "6.1.0"
turbine                     = "1.2.1"
assertk                     = "0.28.1"
androidx-test-ext           = "1.3.0"
androidx-test-espresso      = "3.7.0"

# ── Project Data ────────────────────────────────────────────────────────────
projectApplicationId = "com.dreamstream"
projectApplicationName = "DreamStream"
projectCompileSdkVersion = "37"
projectJavaVersion = "17"
projectMinSdkVersion = "26"
projectTargetSdkVersion = "37"
projectVersion = "1.0.0"
projectVersionCode = "1"

# ═══════════════════════════════════════════════════════════════════════════
[libraries]
# ═══════════════════════════════════════════════════════════════════════════

# ── Kotlin Standard Library ────────────────────────────────────────────────
kotlin-stdlib               = { group = "org.jetbrains.kotlin", name = "kotlin-stdlib", version.ref = "kotlin" }

# ── KotlinX - Coroutines, Serialization, Datetime ──────────────────────────
kotlinx-coroutines-core      = { group = "org.jetbrains.kotlinx",   name = "kotlinx-coroutines-core",       version.ref = "kotlinx-coroutines" }
