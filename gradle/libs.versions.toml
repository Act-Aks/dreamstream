androidx-appcompat                      = { group = "androidx.appcompat",  name = "appcompat",                      version.ref = "androidx-appcompat" }
androidx-core-ktx                       = { group = "androidx.core",       name = "core-ktx",                       version.ref = "androidx-core-ktx" }
androidx-activity-compose               = { group = "androidx.activity",   name = "activity-compose",               version.ref = "androidx-activity" }
androidx-tv-foundation                  = { group = "androidx.tv",         name = "tv-foundation",                  version.ref = "androidx-tv" }
androidx-tv-material                    = { group = "androidx.tv",         name = "tv-material",                    version.ref = "androidx-tv" }

# ── Lifecycle ───────────────────────────────────────────────────────────────
lifecycle-runtime-compose       = { group = "org.jetbrains.androidx.lifecycle", name = "lifecycle-runtime-compose",        version.ref = "compose-lifecycle" }
lifecycle-runtime               = { group = "org.jetbrains.androidx.lifecycle", name = "lifecycle-runtime",                version.ref = "compose-lifecycle" }
lifecycle-viewmodel-compose     = { group = "org.jetbrains.androidx.lifecycle", name = "lifecycle-viewmodel-compose",      version.ref = "compose-lifecycle" }
lifecycle-viewmodel             = { group = "org.jetbrains.androidx.lifecycle", name = "lifecycle-viewmodel",              version.ref = "compose-lifecycle" }
