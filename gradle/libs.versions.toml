]

coil = [
    "coil-compose",
    "coil-core",
    "coil-network-ktor3",
]

androidx-tv = [
    "androidx-tv-foundation",
    "androidx-tv-material",
]

media3 = [
    "androidx-media3-datasource-okhttp",
    "androidx-media3-exoplayer",
    "androidx-media3-exoplayer-dash",
    "androidx-media3-exoplayer-hls",
    "androidx-media3-exoplayer-rtsp",
