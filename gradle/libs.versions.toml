# App modules never reference bundles directly — they apply a convention plugin.

lifecycle-compose = [
    "lifecycle-runtime",
    "lifecycle-runtime-compose",
    "lifecycle-viewmodel",
    "lifecycle-viewmodel-compose",
    "lifecycle-viewmodel-navigation3",
