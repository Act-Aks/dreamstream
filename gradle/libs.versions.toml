compose-material-icons-core     = { group = "org.jetbrains.compose.material",    name = "material-icons-core",      version.ref = "material-icons"         }
compose-material-icons-extended = { group = "org.jetbrains.compose.material",    name = "material-icons-extended",  version.ref = "material-icons"         }
compose-runtime                 = { group = "org.jetbrains.compose.runtime",     name = "runtime",                  version.ref = "compose-multiplatform"  }
compose-runtime-livedata        = { group = "org.jetbrains.compose.runtime",     name = "runtime-livedata",         version.ref = "compose-multiplatform"  }
compose-components-resources    = { group = "org.jetbrains.compose.components",  name = "components-resources",     version.ref = "compose-multiplatform"  }
