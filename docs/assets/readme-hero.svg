<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">DreamStream hero banner</title>
  <desc id="desc">A gradient banner for DreamStream showing a media card, playback controls, and architecture badges.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050816" />
      <stop offset="0.46" stop-color="#312E81" />
      <stop offset="1" stop-color="#0F766E" />
    </linearGradient>
    <linearGradient id="card" x1="260" y1="76" x2="945" y2="347" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.22" />
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.08" />
    </linearGradient>
    <linearGradient id="poster" x1="756" y1="82" x2="976" y2="334" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C084FC" />
      <stop offset="0.48" stop-color="#60A5FA" />
      <stop offset="1" stop-color="#2DD4BF" />
    </linearGradient>
    <filter id="shadow" x="204" y="44" width="790" height="344" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix" />
