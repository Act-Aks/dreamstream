# DreamStream Detekt ruleset.
# Rules are grouped by category. Disabled rules carry a comment explaining why.
# The Compose-specific rules (io.nlopez.compose.rules) extend this config.

config:
  validation: true
  warningsAsErrors: false  # config-level warnings don't fail the build
  checkExhaustiveness: false

processors:
  active: true
  exclude:
    - 'DetektProgressListener'

console-reports:
  active: true
  exclude:
    - 'ProjectStatisticsReport'
    - 'ComplexityReport'
    - 'NotificationReport'

# ── Complexity ────────────────────────────────────────────────────────────────
complexity:
  active: true
  CognitiveComplexMethod:
    active: true
    allowedComplexity: 15
  ComplexCondition:
    active: true
    allowedConditions: 4
  CyclomaticComplexMethod:
    active: true
    allowedComplexity: 15
    ignoreSingleWhenExpression: true
  LargeClass:
    active: true
    allowedLines: 600
  LongMethod:
    active: true
    allowedLines: 60
    ignoreAnnotated: ['Composable', 'Preview']   # Composables are naturally longer
  LongParameterList:
    active: true
    allowedFunctionParameters: 8
    allowedConstructorParameters: 8
    ignoreDefaultParameters: true
    ignoreDataClasses: true
    ignoreAnnotatedParameter: ['Composable']
  NestedBlockDepth:
    active: true
    allowedDepth: 4
  TooManyFunctions:
    active: true
    allowedFunctionsPerFile: 20
    allowedFunctionsPerClass: 15
    allowedFunctionsPerInterface: 10
    allowedFunctionsPerObject: 15
    allowedFunctionsPerEnum: 10
    ignoreDeprecated: true
    ignorePrivate: false
    ignoreOverridden: true

# ── Coroutines ────────────────────────────────────────────────────────────────
coroutines:
  active: true
  GlobalCoroutineUsage:
    active: true   # GlobalScope is banned; use viewModelScope or lifecycleScope
  InjectDispatcher:
    active: true
    dispatcherNames: ['IO', 'Default', 'Unconfined']
  RedundantSuspendModifier:
    active: true
  SleepInsteadOfDelay:
    active: true
  SuspendFunWithCoroutineScopeReceiver:
    active: true

# ── Empty blocks ──────────────────────────────────────────────────────────────
empty-blocks:
  active: true
  EmptyFunctionBlock:
    active: true
    ignoreOverridden: true   # overriding an empty interface function is intentional
  EmptyCatchBlock:
    active: true
    allowedExceptionNameRegex: '_|(ignored|expected).*'

# ── Exceptions ────────────────────────────────────────────────────────────────
exceptions:
  active: true
  ExceptionRaisedInUnexpectedLocation:
    active: true
  PrintStackTrace:
    active: true
  SwallowedException:
    active: true
    ignoredExceptionTypes:
      - 'InterruptedException'
      - 'NumberFormatException'
      - 'ParseException'
      - 'MalformedURLException'
    allowedExceptionNameRegex: '_|(ignored|expected).*'
  ThrowingExceptionsWithoutMessageOrCause:
    active: true
  TooGenericExceptionCaught:
    active: true
    exceptionNames:
      - 'ArrayIndexOutOfBoundsException'
      - 'Error'
      - 'Exception'
      - 'IllegalMonitorStateException'
      - 'IndexOutOfBoundsException'
      - 'NullPointerException'
      - 'RuntimeException'
      - 'Throwable'
    allowedExceptionNameRegex: '_|(ignored|expected).*'
  TooGenericExceptionThrown:
    active: true

# ── Naming ────────────────────────────────────────────────────────────────────
naming:
  active: true
  ClassNaming:
    active: true
    classPattern: '[A-Z][a-zA-Z0-9]*'
  ConstructorParameterNaming:
    active: true
    parameterPattern: '[a-z][A-Za-z0-9]*'
  EnumNaming:
    active: true
    enumEntryPattern: '[A-Z][_A-Z0-9]*'   # SCREAMING_SNAKE for enum entries
  FunctionNaming:
    active: true
    functionPattern: '([a-z][a-zA-Z0-9]*)|(`.*`)'
    ignoreAnnotated: ['Composable']   # Composable functions use PascalCase
  FunctionParameterNaming:
    active: true
    parameterPattern: '[a-z][A-Za-z0-9]*'
  MatchingDeclarationName:
    active: true
    mustBeFirst: true
  MemberNameEqualsClassName:
    active: true
    ignoreOverridden: true
  NoNameShadowing:
    active: true
  VariableNaming:
    active: true
    variablePattern: '[a-z][A-Za-z0-9]*'
    privateVariablePattern: '(_)?[a-z][A-Za-z0-9]*'
    excludeClassPattern: '$^'
  # Forbid naming any class or object "Impl" — see ARCH conventions.
  InvalidPackageDeclaration:
    active: true

# ── Performance ───────────────────────────────────────────────────────────────
performance:
  active: true
  ArrayPrimitive:
    active: true
  CouldBeSequence:
    active: true
    allowedOperations: 3
  ForEachOnRange:
    active: true
  SpreadOperator:
    active: true
    excludes: []
  UnnecessaryPartOfBinaryExpression:
    active: true

# ── Potential bugs ────────────────────────────────────────────────────────────
potential-bugs:
  active: true
  AvoidReferentialEquality:
    active: true
  CastToNullableType:
    active: true
  Deprecation:
    active: false   # deprecated APIs often can't be avoided immediately
  DontDowncastCollectionTypes:
    active: true
  ElseCaseInsteadOfExhaustiveWhen:
    active: true
  EqualsAlwaysReturnsTrueOrFalse:
    active: true
  IgnoredReturnValue:
    active: true
    restrictToConfig: true
    returnValueAnnotations: ['CheckResult', 'CheckReturnValue']
  ImplicitDefaultLocale:
    active: true
  MissingPackageDeclaration:
    active: true
  NullCheckOnMutableProperty:
    active: true
  UnreachableCatchBlock:
    active: true
  UnsafeCallOnNullableType:
    active: true
    excludes: ['**/test/**', '**/*Test*']
  UnsafeCast:
    active: true
    excludes: ['**/test/**']
  UnusedUnaryOperator:
    active: true
  UselessPostfixExpression:
    active: true

# ── Style ─────────────────────────────────────────────────────────────────────
style:
  active: true
  AbstractClassCanBeInterface:
    active: true
  AbstractClassCanBeConcreteClass:
    active: true
  AlsoCouldBeApply:
    active: true
  BracesOnIfStatements:
    active: true
    singleLine: 'never'
    multiLine: 'always'
  ClassOrdering:
    active: true
  CollapsibleIfStatements:
    active: true
  DataClassShouldBeImmutable:
    active: true
  DestructuringDeclarationWithTooManyEntries:
    active: true
    maxDestructuringEntries: 3
  EqualsNullCall:
    active: true
  ExplicitCollectionElementAccessMethod:
    active: true
  ExpressionBodySyntax:
    active: false  # preference, not enforced
  ForbiddenComment:
    active: true
    comments:
      - reason: 'Use a GitHub issue instead of a FIXME comment.'
        value: 'FIXME:'
      - reason: 'Resolve the HACK before merging.'
        value: 'HACK:'
      - reason: 'STOPSHIP comments must not reach main.'
        value: 'STOPSHIP'
    allowedPatterns: ''
  ForbiddenImport:
    active: true
    forbiddenImports:
      # Enforce Result from our own domain, not kotlin.Result
      - value: 'kotlin.Result'
        reason: 'Use io.dreamstream.core.domain.Result, not kotlin.Result.'
      - value: 'kotlinx.coroutines.GlobalScope'
        reason: 'Use viewModelScope or a structured scope instead of GlobalScope.'
      - value: 'java.util.logging.*'
        reason: 'Use Kermit for logging.'
  MagicNumber:
    active: true
    excludes: ['**/test/**', '**/*Test*', '**/Composable*', '**/*Composable*']
    ignoreNumbers: ['-1', '0', '1', '2', '100', '1000']
    ignorePropertyDeclaration: true
    ignoreAnnotation: true
    ignoreCompanionObjectPropertyDeclaration: true
  MaxLineLength:
    active: true
    maxLineLength: 140
    excludePackageStatements: true
    excludeImportStatements: true
    excludeCommentStatements: false
  NoTabs:
    active: true
  OptionalAbstractKeyword:
    active: true
  RedundantExplicitType:
    active: true
  RedundantVisibilityModifier:
    active: false  # explicit `public` is acceptable for clarity
  ReturnCount:
    active: true
    max: 4
    excludedFunctions: ['equals']
    excludeGuardClauses: true
  SpacingAfterPackageAndImports:
    active: true
  TrailingWhitespace:
    active: true
  UnderscoresInNumericLiterals:
    active: true
    acceptableLength: 5   # 10_000 not 10000
  UnnecessaryLet:
    active: true
  RangeUntilInsteadOfRangeTo:
    active: true
  UnusedImport:
    active: true
  UnusedPrivateClass:
    active: true
  UnusedPrivateFunction:
    active: true
    allowedNames: '(_|ignored|expected|serialVersionUID)'
  UnusedPrivateProperty:
    active: true
    allowedNames: '(_|ignored|expected|serialVersionUID)'
  UseCheckNotNull:
    active: true
  UseRequire:
    active: true
  UseRequireNotNull:
    active: true
  VarCouldBeVal:
    active: true
    ignoreLateinitVar: false
  WildcardImport:
    active: true
    excludeImports: ['kotlinx.android.synthetic.*']
